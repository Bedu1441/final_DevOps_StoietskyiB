apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: final-devops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Bedu1441/final_DevOps_StoietskyiB.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true